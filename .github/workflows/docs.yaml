name: Docs

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --group docs
      # Convert + execute the notebooks from their jupytext sources, in parallel (the five
      # pages are independent, and compare-plot is the long pole). The build itself then
      # renders the cached outputs — mkdocs-jupyter execute is off.
      - name: Execute notebooks
        run: |
          printf '%s\n' getting-started metrics dims compare-plot reference \
            | xargs -P4 -I{} uv run jupytext --to ipynb --execute docs/{}.md
      - run: uv run mkdocs gh-deploy --force

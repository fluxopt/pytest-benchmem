name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-24.04
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      # Default GITHUB_TOKEN — no GitHub App / secrets needed. Publishing is a
      # downstream job in this same run (gated on release_created), so there's
      # no "GITHUB_TOKEN won't trigger another workflow" problem to work around.
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Build & publish to PyPI
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      attestations: write
    environment:
      name: pypi
      url: https://pypi.org/project/peakbench
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build
        run: uv build

      # OIDC trusted publishing — no API token. Configure the publisher on PyPI
      # against this workflow file (release.yaml) and the 'pypi' environment.
      - uses: pypa/gh-action-pypi-publish@release/v1

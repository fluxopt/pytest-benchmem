version: 2

updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"
    groups:
      linting:
        patterns:
          - "ruff"
          - "mypy"
          - "pre-commit"
      testing:
        patterns:
          - "pytest*"
      documentation:
        patterns:
          - "mkdocs*"
          - "jupytext"
          - "ipykernel"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
    commit-message:
      prefix: "ci"

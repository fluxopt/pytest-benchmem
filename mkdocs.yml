site_name: pytest-benchmem
site_description: The memory companion to pytest-benchmark — a memray peak-memory pass on the same test.
site_url: https://pytest-benchmem.readthedocs.io/en/latest/
repo_url: https://github.com/fluxopt/pytest-benchmem
docs_dir: docs

theme:
  name: material

  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle: { icon: material/weather-night, name: Dark mode }
    - scheme: slate
      primary: custom
      accent: custom
      toggle: { icon: material/weather-sunny, name: Light mode }

  font:
    text: Roboto
    code: JetBrains Mono

  features:
    - navigation.instant
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.select

nav:
  - Home: index.md
  - Getting started: getting-started.ipynb
  - Metrics: metrics.ipynb
  - Grouping by dims: dims.ipynb
  - Compare & plot: compare-plot.ipynb
  - Cross-version sweeps: sweeps.md
  - Reference: reference.ipynb

plugins:
  - search
  - mkdocs-jupyter:
      execute: true
      include: ["*.ipynb"]
      include_source: true
      remove_tag_config:
        remove_input_tags: ["hide-input"]
        remove_all_outputs_tags: ["hide-output"]
        remove_cell_tags: ["hide-cell"]

# Exclude the notebook pages' jupytext .md sources — CI converts them to .ipynb
# (docs.yaml) and mkdocs-jupyter serves those. index.md/sweeps.md stay as markdown.
exclude_docs: |
  getting-started.md
  metrics.md
  dims.md
  compare-plot.md
  reference.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/notebook-prompts.js

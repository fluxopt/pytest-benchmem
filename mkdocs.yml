site_name: pytest-benchmem
site_description: The memory companion to pytest-benchmark — a memray peak-memory pass on the same test.
repo_url: https://github.com/fluxopt/pytest-benchmem
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle: { icon: material/weather-night, name: Dark mode }
    - scheme: slate
      primary: indigo
      toggle: { icon: material/weather-sunny, name: Light mode }
  features:
    - navigation.instant
    - content.code.copy

nav:
  - Home: index.md
  - Getting started: getting-started.ipynb
  - Metrics: metrics.ipynb
  - Grouping by dims: dims.ipynb
  - Compare & plot: compare-plot.ipynb
  - Cross-version sweeps: sweeps.md
  - Reference: reference.md

plugins:
  - search
  - mkdocs-jupyter:
      execute: true
      include: ["*.ipynb"]
      include_source: true

# The four notebook pages have jupytext .md sources (getting-started.md, metrics.md,
# dims.md, compare-plot.md). Run `jupytext --to ipynb docs/getting-started.md …`
# before building (the docs workflow does this in CI); mkdocs-jupyter then executes
# the generated .ipynb. Exclude the raw notebook sources so they aren't also served
# as their own pages — index.md, sweeps.md, and reference.md are plain markdown and
# stay served.
exclude_docs: |
  getting-started.md
  metrics.md
  dims.md
  compare-plot.md

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - tables

site_name: pytest-benchmem
site_description: The memory companion to pytest-benchmark — a memray peak-memory pass on the same test.
site_url: https://pytest-benchmem.readthedocs.io/en/latest/
repo_url: https://github.com/fluxopt/pytest-benchmem
docs_dir: docs

theme:
  name: material

  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle: { icon: material/weather-night, name: Dark mode }
    - scheme: slate
      primary: custom
      accent: custom
      toggle: { icon: material/weather-sunny, name: Light mode }

  font:
    text: Roboto
    code: JetBrains Mono

  features:
    - navigation.instant
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.select

nav:
  - Home: index.md
  - Quickstart: getting-started.md
  - Guides:
      - Choosing a metric: metrics.md
      - Compare & gate CI: compare-plot.ipynb
      - Grouping by dims: dims.md
      - Cross-version sweeps: sweeps.md
  - Reference: reference.md

plugins:
  - search
  - macros:
      module_name: docs_macros
      # Distinctive delimiters so ordinary {{ }} in docs (e.g. GitHub Actions ${{ }})
      # is left untouched; only [[[ macro() ]]] is rendered.
      j2_variable_start_string: "[[["
      j2_variable_end_string: "]]]"
  - mkdocs-jupyter:
      execute: true
      include: ["*.ipynb"]
      include_source: true
      remove_tag_config:
        remove_input_tags: ["hide-input"]
        remove_all_outputs_tags: ["hide-output"]
        remove_cell_tags: ["hide-cell"]
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            show_signature_annotations: true
            separate_signature: true
            heading_level: 3
            members_order: source
  - mkdocs-typer2:
      pretty: true

# compare-plot is the one executed notebook (live plotly views) — CI converts its
# jupytext .md source to .ipynb (docs.yaml) and mkdocs-jupyter serves that. Every other
# page is plain markdown.
exclude_docs: |
  compare-plot.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/notebook-prompts.js
